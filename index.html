<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naughty Nuts Cafe POS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; padding:10px;}
.container { max-width:500px; margin:auto; background:white; padding:15px; border-radius:10px;}
h2 { text-align:center; }

input, button {
    width:100%;
    padding:10px;
    margin:5px 0;
}

button { background:black; color:white; border:none; }

table { width:100%; margin-top:10px;}
td, th { padding:5px; border-bottom:1px solid #ddd;}

.suggestions {
    background:white;
    border:1px solid #ccc;
    max-height:120px;
    overflow-y:auto;
}
.suggestions div { padding:5px; cursor:pointer;}
.suggestions div:hover { background:#eee; }

.nav { display:flex; gap:5px; }
.nav button { flex:1; }
</style>
</head>

<body>

<div class="container">

<div class="nav">
<button onclick="showPage('billing')">Billing</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<h2>NAUGHTY NUTS CAFE</h2>

<!-- BILLING PAGE -->
<div id="billingPage">

<input id="customer" placeholder="Customer Name">
<input id="table" placeholder="Table Number">

<input id="item" placeholder="Search item..." onkeyup="searchItem()">
<div id="suggestions" class="suggestions"></div>

<input id="qty" type="number" placeholder="Quantity">
<input id="price" placeholder="Price">

<button onclick="addItem()">Add Item</button>

<table id="bill">
<tr><th>Item</th><th>Qty</th><th>Total</th></tr>
</table>

<h3 id="total">Total: ₹0</h3>

<button onclick="printBill()">🧾 Print & Save</button>

</div>

<!-- ADMIN PAGE -->
<div id="adminPage" style="display:none;">

<h3>Menu Management</h3>
<input id="mName" placeholder="Item Name">
<input id="mPrice" placeholder="Price">
<button onclick="addMenu()">Add Menu Item</button>

<ul id="menuList"></ul>

<h3>Sales Records</h3>
<button onclick="loadSales()">Load Sales</button>
<ul id="salesList"></ul>

</div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDD0omDsE4R47xudQjU2o5RMFCBOv5jcQc",
  authDomain: "naughty-nuts-cafe.firebaseapp.com",
  projectId: "naughty-nuts-cafe",
  storageBucket: "naughty-nuts-cafe.firebasestorage.app",
  messagingSenderId: "335400015770",
  appId: "1:335400015770:web:8a9361061513c7a0254c23",
  measurementId: "G-QMSSJ8VLEC"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let total = 0;

function showPage(page) {
    billingPage.style.display = page === 'billing' ? 'block' : 'none';
    adminPage.style.display = page === 'admin' ? 'block' : 'none';
    if(page === 'admin') loadMenu();
}

async function searchItem() {
    let text = item.value.toLowerCase();
    suggestions.innerHTML = "";

    let snap = await db.collection("menu").get();

    snap.forEach(doc => {
        let d = doc.data();
        if(d.name.toLowerCase().includes(text)) {
            let div = document.createElement("div");
            div.innerHTML = d.name + " - ₹" + d.price;
            div.onclick = () => {
                item.value = d.name;
                price.value = d.price;
                suggestions.innerHTML = "";
            };
            suggestions.appendChild(div);
        }
    });
}

function addItem() {
    let name = item.value;
    let p = parseFloat(price.value);
    let q = parseInt(qty.value);

    if(!name || isNaN(p) || isNaN(q)) return alert("Enter valid");

    let t = p * q;

    let row = bill.insertRow();
    row.insertCell(0).innerHTML = name;
    row.insertCell(1).innerHTML = q;
    row.insertCell(2).innerHTML = "₹"+t;

    total += t;
    document.getElementById("total").innerText = "Total: ₹" + total;

    item.value = "";
    price.value = "";
    qty.value = "";
}

async function printBill() {
    let now = new Date();

    await db.collection("sales").add({
        table: table.value,
        total: total,
        date: now.toLocaleDateString(),
        time: now.toLocaleTimeString()
    });

    window.print();
}

async function addMenu() {
    await db.collection("menu").add({
        name: mName.value,
        price: parseFloat(mPrice.value)
    });
    alert("Added");
    loadMenu();
}

async function loadMenu() {
    menuList.innerHTML = "";
    let snap = await db.collection("menu").get();

    snap.forEach(doc => {
        let d = doc.data();

        let li = document.createElement("li");
        li.innerHTML = `${d.name} - ₹${d.price}
        <button onclick="deleteMenu('${doc.id}')">Delete</button>`;

        menuList.appendChild(li);
    });
}

async function deleteMenu(id) {
    await db.collection("menu").doc(id).delete();
    loadMenu();
}

async function loadSales() {
    salesList.innerHTML = "";
    let snap = await db.collection("sales").get();

    snap.forEach(doc => {
        let d = doc.data();
        let li = document.createElement("li");
        li.innerText = `${d.date} | ${d.table} | ₹${d.total}`;
        salesList.appendChild(li);
    });
}
</script>

</body>
</html>
